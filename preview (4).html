<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu điểm KSCL đầu tháng 6</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman", Times, serif;
}

body{
    background:#efefef;
}

.header{
    background:#2f6db5;
    color:#ffff66;
    padding:15px 20px;
}

.header-container{
    width:1000px;
    margin:auto;
    display:flex;
    align-items:center;
}

.logo{
    width:70px;
    margin-right:15px;
}

.header h2{
    font-size:22px;
}

.header h3{
    font-size:30px;
    font-weight:bold;
}

.time-box{
    width:260px;
    margin:10px auto;
    border:1px solid #ccc;
    background:white;
    text-align:center;
    padding:5px;
    font-size:14px;
}

.main{
    width:1000px;
    min-height:600px;
    background:white;
    margin:auto;
    border:1px solid #ccc;
    padding:40px;
}

.title{
    text-align:center;
}

.title h2{
    font-size:22px;
}

.title h3{
    font-size:32px;
    margin-top:8px;
}

.desc{
    text-align:center;
    margin:20px 0;
}

.form{
    width:550px;
    margin:auto;
}

table{
    width:100%;
}

td{
    padding:8px;
    font-size:18px;
}

input{
    width:100%;
    height:36px;
    border:1px solid #999;
    padding-left:10px;
    font-size:18px;
}

.captcha-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.captcha{
    width:120px;
    height:36px;
    border:1px solid #999;
    background:#f5f5f5;
    text-align:center;
    line-height:36px;
    color:#3366cc;
    font-weight:bold;
    font-style:italic;
    letter-spacing:3px;
}

.reload{
    font-size:22px;
    cursor:pointer;
}

.btn{
    text-align:center;
    margin-top:15px;
}

button{
    background:#2f80d1;
    color:white;
    border:none;
    padding:10px 35px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1f5ea5;
}

.result{
    margin-top:35px;
    font-size:18px;
}

.note{
    margin-top:15px;
    font-style:italic;
}

.student{
    color:red;
    font-weight:bold;
    font-size:22px;
    line-height:1.6;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="header">
    <div class="header-container">

        <img class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Coat_of_arms_of_Vietnam.svg/1200px-Coat_of_arms_of_Vietnam.svg.png">

        <div>
            <h2>Hội đồng thi KSCL đầu tháng 6</h2>
            <h3>TRANG THÔNG TIN KỲ THI KSCL ĐẦU THÁNG 6</h3>
        </div>

    </div>
</div>

<div class="time-box" id="time"></div>

<div class="main">

    <div class="title">
        <h2>HỘI ĐỒNG THI KSCL ĐẦU THÁNG 6</h2>
        <h3>TRA CỨU ĐIỂM THI</h3>
    </div>

    <div class="desc">
        Thí sinh nhập số báo danh và mã xác nhận vào các ô dưới đây
    </div>

    <div class="form">

        <table>

            <tr>
                <td width="150">Số báo danh</td>
                <td>
                    <input
                    type="text"
                    id="sbd"
                    placeholder="Nhập số báo danh">
                </td>
            </tr>

            <tr>
                <td>Mã xác nhận</td>

                <td>
                    <div class="captcha-box">

                        <input
                        type="text"
                        id="captchaInput"
                        placeholder="Nhập mã xác nhận">

                        <div
                        class="captcha"
                        id="captchaText">
                        </div>

                        <span
                        class="reload"
                        onclick="taoCaptcha()">↻</span>

                    </div>
                </td>
            </tr>

        </table>

        <div class="btn">
            <button onclick="traCuu()">
                Tra cứu
            </button>
        </div>

    </div>

    <div id="ketqua" class="result"></div>

</div>

<script>

function capNhatGio(){
    const now = new Date();

    document.getElementById("time").innerHTML =
    "Đang truy cập lúc: " +
    now.toLocaleString("vi-VN");
}

capNhatGio();
setInterval(capNhatGio,1000);

let captcha = "";

function taoCaptcha(){

    const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    captcha = "";

    for(let i=0;i<5;i++){

        captcha += chars.charAt(
        Math.floor(Math.random()*chars.length));

    }

    document.getElementById("captchaText")
    .innerHTML = captcha;
}

taoCaptcha();

function traCuu(){

    let sbd =
    document.getElementById("sbd")
    .value.trim();

    let maNhap =
    document.getElementById("captchaInput")
    .value.trim();

    if(maNhap !== captcha){

        alert("Mã xác nhận không đúng!");
        taoCaptcha();
        return;
    }

    if(sbd === "071983"){

        document.getElementById("ketqua").innerHTML = `

        <div class="student">
            Họ và tên học sinh: Dương Mạnh Tân<br>
            Số báo danh (SBD): 071983
        </div>

        <b>Điểm các môn:</b><br><br>

        <b>
        Toán: 9,0
        &nbsp;&nbsp;&nbsp;

        Địa lý: 8,0
        &nbsp;&nbsp;&nbsp;

        Khoa học tự nhiên: 9,5
        </b>

        <div class="note">
            Ghi chú: Điểm (*) là điểm ưu tiên nếu có.
        </div>
        `;
    }
    else{

        document.getElementById("ketqua").innerHTML =
        "<span style='color:red;font-weight:bold'>Không tìm thấy số báo danh!</span>";
    }
}

</script>

</body>
</html>
